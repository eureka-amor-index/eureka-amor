<h1>What is SXO?</h1>

<p>
Search Experience Optimization is the evolution of SEO.
It focuses not only on rankings but on the full interaction
between humans, search systems and digital environments.
</p>

<p>
SXO combines technical SEO, UX and entity-based search.
